version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: portfoliodb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d portfoliodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-dev:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    container_name: dev_portfolio_backend
    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - ../backend:/workspace:cached
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=portfoliodb;Username=${DB_USER:-devuser};Password=${DB_PASSWORD:-devpass}
    depends_on:
      db:
        condition: service_healthy

  # Container 2: Pures Node.js
  frontend-dev:
    image: mcr.microsoft.com/devcontainers/typescript-node:20
    container_name: dev_portfolio_frontend
    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - ../frontend:/workspace:cached
    ports:
      - "5173:5173" # Vite Port für deinen Browser

volumes:
  postgres_data:
