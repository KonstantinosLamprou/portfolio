version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: portfoliodb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d portfoliodb"]
      interval: 5s
      timeout: 5s
      retries: 5
  seq:
      image: datalust/seq:latest
      container_name: portfolio_seq
      environment:
        - ACCEPT_EULA=Y
        - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_FIRSTRUN_ADMINPASSWORD}
      ports:
        - "5341:80"
      restart: unless-stopped
      volumes:
        - seq_data:/data
  workspace:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    container_name: portfolio_workspace
    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - ../:/workspace
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=portfoliodb;Username=${DB_USER:-devuser};Password=${DB_PASSWORD:-devpass}
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_started

volumes:
  postgres_data:
  seq_data: