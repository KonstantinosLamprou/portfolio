version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: portfoliodb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d portfoliodb"]
          interval: 5s
          timeout: 5s
          retries: 5

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # .NET zieht sich das Passwort hier vollautomatisch heraus
      - ConnectionStrings__DefaultConnection=Host=db;Database=portfoliodb;Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      db: 
        condition: service_healthy

volumes:
  postgres_data:
