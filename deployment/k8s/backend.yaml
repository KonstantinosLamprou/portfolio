
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: portfolio-prod
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080 
      targetPort: 8080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: portfolio-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/konstantinoslamprou/portfolio-backend:latest
          imagePullPolicy: Always 
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DB_USER
            - name: SECRET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DB_PASSWORD
            - name: FrontendUrl
              value: "https://kostas-lamprou.de"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000" 
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres-service;Port=5432;Database=portfoliodb;Username=$(SECRET_USER);Password=$(SECRET_PASSWORD)"
            - name: Authentication__GitHub__ClientId
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GITHUB_PROD_CLIENT_ID
            - name: Authentication__GitHub__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GITHUB_PROD_CLIENT_SECRET
            - name: Authentication__Google__ClientId
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GOOGLE_PROD_CLIENT_ID
            - name: Authentication__Google__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GOOGLE_PROD_CLIENT_SECRET
            - name: Admin__Emails__0
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ADMIN_EMAIL
