
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080 
      targetPort: 8080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: portfolio-backend:latest
          imagePullPolicy: Never 
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DB_USER
            - name: SECRET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DB_PASSWORD
            
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres-service;Port=5432;Database=portfoliodb;Username=$(SECRET_USER);Password=$(SECRET_PASSWORD)"
