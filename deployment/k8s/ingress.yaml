apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio-prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod" 
    traefik.ingress.kubernetes.io/router.middlewares: portfolio-prod-portfolio-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kostas-lamprou.de
        - www.kostas-lamprou.de
      secretName: portfolio-tls-secret 
  rules:
    - host: kostas-lamprou.de
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080 
          - path: /signin-google
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /signin-github
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    - host: www.kostas-lamprou.de
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080 
          - path: /signin-google
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /signin-github
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: portfolio-rate-limit
  namespace: portfolio-prod
spec:
  rateLimit:
    average: 20
    burst: 50
