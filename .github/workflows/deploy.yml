name: Build Portfolio 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Docker Buildx einrichten (wichtig für Caching und Performance)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Image bauen
    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        # Passe den Pfad an, falls deine Dockerfile in einem Unterordner liegt
        file: ./backend/Dockerfile 
        push: false 
        # Tags später für Cluster anpassen z.B. tags: ghcr.io/dein-github-name/portfolio-backend:latest
        tags: portfolio-backend:latest
        # Dieser Cache beschleunigt zukünftige Builds enorm, besonders bei .NET NuGet-Restores
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-frontend:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile 
          push: false 
          tags: portfolio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max