name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-container:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository herunterladen
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Docker Buildx einrichten (wichtig für Caching und Performance)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Das Docker Image bauen
    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        # Passe den Pfad an, falls deine Dockerfile in einem Unterordner liegt
        file: ./backend/Dockerfile 
        push: false # Wir bauen das Image hier nur, um Fehler früh zu erkennen
        tags: mein-backend:latest
        # Dieser Cache beschleunigt zukünftige Builds enorm, besonders bei .NET NuGet-Restores
        cache-from: type=gha
        cache-to: type=gha,mode=max